<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRIP-PLAN 編集デモ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0ea5e9;
        --secondary: #f59e0b;
        --accent: #10b981;
        --paper: #ffffff;
        --subtle: #f5f5f4;
        --line: #e5e7eb;
        --text: #1f2937;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f8f8f7;
        font-family:
          "Noto Sans JP",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
      }
      img {
        max-width: 100%;
        display: block;
      }
      .layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #e5e7eb;
        padding: 10px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.04);
      }
      .back-btn {
        border: none;
        background: #f3f4f6;
        border-radius: 999px;
        padding: 8px 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #374151;
        cursor: pointer;
      }
      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .title strong {
        font-size: 1rem;
      }
      .title small {
        color: #6b7280;
      }
      .chip {
        padding: 6px 12px;
        background: rgba(14, 165, 233, 0.1);
        color: var(--primary);
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.85rem;
      }
      .main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 0;
        min-height: 0;
      }
      .timeline {
        position: relative;
        overflow: hidden;
        background: #fdfdfc;
        border-right: 1px solid #f1f1f0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .day-tabs {
        display: flex;
        gap: 8px;
        padding: 14px 16px;
        overflow-x: auto;
        background: rgba(250, 250, 249, 0.85);
        border-bottom: 1px solid #f1f1f0;
      }
      .day-tabs button {
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: 10px 16px;
        background: #fff;
        color: #6b7280;
        font-weight: 700;
        cursor: pointer;
        transition: all 150ms ease;
        white-space: nowrap;
      }
      .day-tabs button.active {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 10px 24px rgba(14, 165, 233, 0.26);
        border-color: transparent;
      }
      .timeline-body {
        flex: 1;
        overflow-y: auto;
        padding: 22px 18px 120px;
        position: relative;
        min-height: 0;
      }
      .timeline-body::before {
        content: "";
        position: absolute;
        left: 58px;
        top: 10px;
        bottom: 10px;
        width: 2px;
        background: var(--line);
        display: none;
      }
      @media (min-width: 880px) {
        .timeline-body::before {
          display: block;
        }
      }
      .item {
        position: relative;
        padding-left: 0;
        margin-bottom: 18px;
      }
      .item:not(:last-child) {
        margin-bottom: 22px;
      }
      .item-time {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        color: #6b7280;
        font-weight: 600;
        min-width: 64px;
        text-align: right;
        padding-right: 12px;
        display: none;
      }
      @media (min-width: 880px) {
        .item {
          padding-left: 96px;
        }
        .item-time {
          display: block;
          position: absolute;
          left: 0;
          top: 20px;
        }
        .dot {
          position: absolute;
          left: 70px;
          top: 28px;
          width: 12px;
          height: 12px;
          border-radius: 50%;
          background: var(--primary);
          border: 3px solid #fff;
          box-shadow: 0 0 0 2px var(--line);
        }
      }
      .card {
        background: #fff;
        border: 1px solid #f1f1f0;
        border-radius: 16px;
        padding: 14px 16px 16px;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.04);
      }
      .card-head {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #f3f4f6;
        display: grid;
        place-items: center;
        font-size: 18px;
        color: #0f172a;
      }
      .card-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
        color: #1f2937;
      }
      .card-desc {
        margin: 4px 0 0;
        color: #6b7280;
        font-size: 0.95rem;
      }
      .pill-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
        align-items: center;
        color: #6b7280;
        font-size: 0.9rem;
      }
      .pill {
        padding: 6px 10px;
        border-radius: 10px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
      }
      .thumb {
        margin-top: 10px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      .sidebar {
        background: #fff;
        min-height: 0;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .side-card {
        background: #fff;
        border: 1px solid #f1f1f0;
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      }
      .side-title {
        margin: 0 0 10px;
        font-size: 0.95rem;
        font-weight: 700;
        color: #111827;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #6b7280;
      }
      .summary-strong {
        font-size: 1.2rem;
        font-weight: 700;
        color: #111827;
      }
      .album-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .album-grid div {
        border-radius: 10px;
        overflow: hidden;
        height: 82px;
        background: #f3f4f6;
      }
      .ghost {
        border: 1px dashed #d1d5db;
        display: grid;
        place-items: center;
        color: #9ca3af;
        font-weight: 700;
      }
      .side-action {
        display: flex;
        gap: 8px;
        flex-direction: column;
        margin-top: 10px;
      }
      .side-action button {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px;
        background: #fafafa;
        color: #374151;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: background 120ms ease;
      }
      .side-action button:hover {
        background: #f1f5f9;
      }
      .dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        border-top: 1px solid #e5e7eb;
        padding: 12px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.08);
      }
      .dock button {
        border: none;
        background: none;
        color: #6b7280;
        font-weight: 700;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .dock .plus {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 6px solid #fff;
        background: var(--primary);
        color: #fff;
        font-size: 28px;
        display: grid;
        place-items: center;
        box-shadow: 0 14px 34px rgba(14, 165, 233, 0.3);
      }
      @media (max-width: 960px) {
        .main {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .dock {
          padding-bottom: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header>
        <button class="back-btn">← ホームへ</button>
        <div class="title">
          <strong>京都紅葉めぐり</strong>
          <small>2023-11-20 〜 2023-11-21</small>
        </div>
        <div class="chip">京都府</div>
      </header>

      <div class="main">
        <section class="timeline">
          <div class="day-tabs">
            <button class="active">1日目 (11/20)</button>
            <button>2日目 (11/21)</button>
            <button>3日目 (11/22)</button>
          </div>

          <div class="timeline-body">
            <div class="item">
              <span class="item-time">10:00</span>
              <span class="dot" aria-hidden="true"></span>
              <article class="card">
                <div class="card-head">
                  <div class="icon">🚉</div>
                  <div>
                    <h3 class="card-title">京都駅到着</h3>
                    <p class="card-desc">
                      東京から新幹線で到着。コインロッカーで荷物を預ける。
                    </p>
                    <div class="pill-row">
                      <span class="pill">移動</span>
                      <span class="pill">¥14,000</span>
                      <span class="pill">10:00</span>
                    </div>
                  </div>
                </div>
              </article>
            </div>

            <div class="item">
              <span class="item-time">12:00</span>
              <span class="dot" aria-hidden="true"></span>
              <article class="card">
                <div class="card-head">
                  <div class="icon">🍽️</div>
                  <div class="content">
                    <h3 class="card-title">湯豆腐ランチ</h3>
                    <p class="card-desc">
                      南禅寺そばの人気店で湯豆腐会席。予約済み。
                    </p>
                    <div class="thumb">
                      <img
                        src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=800&q=80"
                        alt="湯豆腐"
                      />
                    </div>
                    <div class="pill-row">
                      <span class="pill">食事</span>
                      <span class="pill">¥3,500</span>
                      <span class="pill">12:00</span>
                    </div>
                  </div>
                </div>
              </article>
            </div>

            <div class="item">
              <span class="item-time">14:00</span>
              <span class="dot" aria-hidden="true"></span>
              <article class="card">
                <div class="card-head">
                  <div class="icon">📷</div>
                  <div class="content">
                    <h3 class="card-title">清水寺散策</h3>
                    <p class="card-desc">
                      紅葉が見頃。人が多いので早めに移動。奥の院まで足を延ばす。
                    </p>
                    <div class="thumb">
                      <img
                        src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80"
                        alt="清水寺"
                      />
                    </div>
                    <div class="pill-row">
                      <span class="pill">観光</span>
                      <span class="pill">¥400</span>
                      <span class="pill">14:00</span>
                    </div>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <aside class="sidebar">
          <div class="side-card">
            <h4 class="side-title">予算サマリー</h4>
            <div class="summary-row">
              <span>合計 (2人)</span><span class="summary-strong">¥17,900</span>
            </div>
            <div
              class="summary-row"
              style="padding-top: 8px; border-top: 1px solid #f1f1f0"
            >
              <span>1人あたり</span
              ><span class="summary-strong" style="color: var(--primary)"
                >¥8,950</span
              >
            </div>
          </div>

          <div class="side-card">
            <h4 class="side-title">旅のアルバム</h4>
            <div class="album-grid">
              <div>
                <img
                  src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=400&q=80"
                  alt=""
                />
              </div>
              <div>
                <img
                  src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=400&q=80"
                  alt=""
                />
              </div>
              <div class="ghost">＋</div>
            </div>
            <p
              style="
                color: #9ca3af;
                font-size: 0.75rem;
                text-align: center;
                margin: 10px 0 0;
              "
            >
              写真を追加して思い出を整理
            </p>
          </div>

          <div class="side-card">
            <h4 class="side-title">便利ツール</h4>
            <div class="side-action">
              <button>カレンダーに追加</button>
              <button>共有リンクを作成</button>
              <button>オフライン保存</button>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <div class="dock" aria-label="アクションバー">
      <button aria-label="プレビュー">
        👁️<span style="font-size: 0.72rem">保存・見る</span>
      </button>
      <div class="plus" aria-label="予定を追加">＋</div>
      <button aria-label="ツール">
        🛠️<span style="font-size: 0.72rem">便利機能</span>
      </button>
    </div>
  </body>
</html>
